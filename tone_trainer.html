<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>声调旋律训练器 · Tone Melody Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F4ECDF; --panel:#FCF8F1; --ink:#2A1F18; --soft:#6A5848;
  --accent:#BC5B2E; --accent-2:#E2A06F; --caramel:#8A6D3B;
  --line:rgba(42,31,24,.14); --line-2:rgba(42,31,24,.07);
  --shadow:0 18px 42px -20px rgba(42,31,24,.4);
  --cjk:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  --display:"Fraunces",Georgia,serif; --body:"Hanken Grotesk",system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased;line-height:1.5}
.cn{font-family:var(--cjk)}
button{font-family:var(--body);cursor:pointer}
#gate{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:24px;text-align:center}
#gate h1{font-family:var(--display);font-weight:600;font-size:clamp(2rem,7vw,3rem);margin-bottom:6px}
#gate .sub{color:var(--soft);font-style:italic;font-family:var(--display);margin-bottom:30px}
#gate input{font-size:1rem;padding:13px 18px;border:1px solid var(--line);border-radius:40px;background:var(--panel);width:min(280px,80vw);text-align:center;outline:none}
#gate input:focus{border-color:var(--accent)}
#gate button{margin-top:14px;background:var(--ink);color:var(--bg);border:none;border-radius:40px;padding:12px 30px;font-weight:700}
#gate .err{color:var(--accent);font-size:.85rem;margin-top:12px;min-height:1.1em}
#app{display:none;max-width:880px;margin:0 auto;padding:24px 20px 80px}
header{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap;margin-bottom:6px}
.title h1{font-family:var(--display);font-weight:600;font-size:clamp(1.5rem,5vw,2.1rem);line-height:1.05}
.title p{color:var(--soft);font-size:.82rem;letter-spacing:.04em}
.lang-toggle{border:1px solid var(--line);background:var(--panel);border-radius:40px;padding:8px 16px;font-size:.8rem;font-weight:700;color:var(--soft);white-space:nowrap}
.tabs{display:flex;gap:8px;overflow-x:auto;padding:18px 0 8px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{border:1px solid var(--line);background:var(--panel);border-radius:40px;padding:9px 16px;font-size:.9rem;white-space:nowrap;color:var(--soft);font-weight:500;flex:none}
.tab .cn{font-weight:600}.tab.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.deck-note{font-size:.78rem;color:var(--caramel);margin:4px 2px 0}
.stage{background:var(--panel);border:1px solid var(--line-2);border-radius:22px;box-shadow:var(--shadow);padding:26px;margin-top:16px}
.sentence{text-align:center}
.sentence .py{font-size:.95rem;color:var(--accent);letter-spacing:.05em;font-weight:500}
.sentence .zh{font-family:var(--cjk);font-size:clamp(1.8rem,6vw,2.6rem);font-weight:600;line-height:1.3;margin:6px 0;word-break:keep-all}
.sentence .en{font-style:italic;color:var(--soft);font-size:.95rem;transition:opacity .3s}
.sentence .en.hide{opacity:0;height:0;overflow:hidden}
.contour-wrap{margin:22px 0 6px;background:linear-gradient(180deg,rgba(226,160,111,.1),transparent);border-radius:16px;padding:14px 6px}
svg.contour{width:100%;height:150px;overflow:visible;display:block}
.syl-row,.mark-row{display:flex;justify-content:space-around}
.syl-row span{flex:1;text-align:center;font-size:.8rem;color:var(--soft)}
.mark-row span{flex:1;text-align:center;font-size:.85rem}
.mark-row .stress{color:var(--accent)}.mark-row .weak{color:var(--caramel);opacity:.65}
.controls{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:18px}
.play{display:inline-flex;align-items:center;gap:9px;background:var(--ink);color:var(--bg);border:none;border-radius:40px;padding:12px 24px;font-weight:700;font-size:.95rem;transition:transform .15s}
.play:hover{transform:translateY(-2px)}.play svg{width:13px;height:13px;fill:var(--bg)}
.control-group{display:inline-flex;align-items:center;gap:7px;flex-wrap:nowrap}
.control-label{font-family:var(--cjk);font-size:.82rem;font-weight:700;color:var(--ink);white-space:nowrap}
.seg{display:inline-flex;background:var(--bg);border-radius:40px;padding:4px}
.seg button{border:none;background:none;padding:8px 15px;border-radius:40px;font-size:.82rem;font-weight:500;color:var(--soft)}
.seg button.on{background:var(--accent);color:#fff}
.voice-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px;font-size:.78rem;color:var(--soft);flex-wrap:wrap}
.voice-row select{font-family:var(--body);font-size:.8rem;padding:7px 12px;border:1px solid var(--line);border-radius:40px;background:var(--panel);color:var(--ink);max-width:240px}
.tts-off{display:none;font-size:.78rem;color:var(--caramel);text-align:center;margin-top:10px}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:18px}
.nav button{background:var(--panel);border:1px solid var(--line);border-radius:40px;padding:9px 18px;font-weight:600;color:var(--ink)}
.nav .count{font-size:.82rem;color:var(--soft);font-variant-numeric:tabular-nums}
.list{margin-top:20px;display:flex;flex-direction:column;gap:8px}
.item{display:flex;justify-content:space-between;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line-2);border-radius:14px;padding:12px 16px;cursor:pointer;transition:.2s}
.item:hover{border-color:var(--accent-2)}.item.on{border-color:var(--accent);background:#fff}
.item .zh{font-family:var(--cjk);font-size:1.15rem;font-weight:500}
.item .py{font-size:.74rem;color:var(--accent);margin-top:2px}
.item .mini{font-size:.7rem;color:var(--caramel)}
.legend{margin-top:24px;font-size:.78rem;color:var(--soft);background:var(--panel);border:1px solid var(--line-2);border-radius:14px;padding:14px 16px;line-height:1.7}
.legend b{color:var(--accent)}
@media(max-width:520px){.stage{padding:18px}.controls{gap:9px}}
@media(max-width:520px){.control-group{width:100%;justify-content:center}.seg button{padding:8px 13px}}
</style>
</head>
<body>
<div id="gate">
  <h1 class="cn">声调旋律训练器</h1>
  <div class="sub">Tone Melody Trainer</div>
  <input id="pw" type="password" placeholder="输入密码 / password" autocomplete="off">
  <button id="enter">进入 Enter</button>
  <div class="err" id="gerr"></div>
</div>
<div id="app">
  <header>
    <div class="title">
      <h1 class="cn">声调旋律训练器</h1>
      <p>把句子当成一条旋律来说 · speak the sentence as one melody</p>
    </div>
    <button class="lang-toggle" id="langBtn">显示英文 EN</button>
  </header>
  <div class="tabs" id="tabs"></div>
  <div class="deck-note" id="deckNote"></div>
  <div class="stage">
    <div class="sentence">
      <div class="py" id="sPy"></div>
      <div class="zh cn" id="sZh"></div>
      <div class="en hide" id="sEn"></div>
    </div>
    <div class="contour-wrap">
      <svg class="contour" id="svg" viewBox="0 0 600 150" preserveAspectRatio="none"></svg>
      <div class="syl-row" id="sylRow"></div>
      <div class="mark-row" id="markRow"></div>
    </div>
    <div class="controls">
      <button class="play" id="play"><svg viewBox="0 0 10 10"><path d="M1 0 L9 5 L1 10 Z"/></svg><span>播放</span></button>
      <div class="control-group">
        <span class="control-label">音色</span>
        <div class="seg" id="voicePick">
          <button class="on" data-v="f">女声</button>
          <button data-v="m">男声</button>
          <button data-v="k">儿童</button>
        </div>
      </div>
      <div class="control-group">
        <span class="control-label">速度</span>
        <div class="seg" id="mode">
          <button class="on" data-m="n">正常</button>
          <button data-m="s">慢速</button>
        </div>
      </div>
    </div>
    <div class="voice-row" id="voiceRow"><span>音色（备用）</span><select id="voiceSel"></select></div>
    <div class="tts-off" id="ttsOff">这台设备暂时没有中文语音。</div>
    <div class="nav">
      <button id="prev">← 上一句</button>
      <span class="count" id="count"></span>
      <button id="next">下一句 →</button>
    </div>
  </div>
  <div class="list" id="list"></div>
  <div class="legend cn">
    <b>怎么看这条线：</b>音节按真实声调起伏——一声高平、二声上升、四声下降、三声/半三声压低、轻声是空心点。
    <b>粗而实</b>的是重读音节，<b>细而淡</b>的是要轻读、带过的音节。先用「正常」听整句旋律，再用「慢速」把每个音听清，然后跟着说。
  </div>
</div>

<script>
/* 真人音频会由 build_voice.py 注入到下面这个对象里；在注入之前，播放会自动退回浏览器语音。 */
const AUDIO = /*__AUDIO_DATA__*/ {};

/* tone: 1高平 2升 3全三声 4降 5半三声 0轻声 ; s: stress|weak|'' */
const decks=[
 {id:"cafe", name:"咖啡生存口语", full:true, sents:[
   {id:"cafe-1",zh:"我要一杯咖啡",en:"I'd like a coffee.",syl:[{p:"wǒ",t:5,s:"weak"},{p:"yào",t:4,s:"weak"},{p:"yì",t:4},{p:"bēi",t:1},{p:"kā",t:1,s:"stress"},{p:"fēi",t:1}]},
   {id:"cafe-2",zh:"我要热的",en:"I'd like it hot.",syl:[{p:"wǒ",t:5,s:"weak"},{p:"yào",t:4,s:"weak"},{p:"rè",t:4,s:"stress"},{p:"de",t:0,s:"weak"}]},
   {id:"cafe-3",zh:"来一个蛋糕",en:"I'll have a cake.",syl:[{p:"lái",t:2},{p:"yí",t:2},{p:"ge",t:0,s:"weak"},{p:"dàn",t:4,s:"stress"},{p:"gāo",t:1}]},
   {id:"cafe-4",zh:"这个多少钱",en:"How much is this?",syl:[{p:"zhè",t:4},{p:"ge",t:0,s:"weak"},{p:"duō",t:1,s:"stress"},{p:"shao",t:0,s:"weak"},{p:"qián",t:2,s:"stress"}]},
   {id:"cafe-5",zh:"还要别的吗",en:"Anything else?",syl:[{p:"hái",t:2},{p:"yào",t:4},{p:"bié",t:2,s:"stress"},{p:"de",t:0,s:"weak"},{p:"ma",t:0,s:"weak"}]},
   {id:"cafe-6",zh:"一共四十五块",en:"Forty-five yuan in total.",syl:[{p:"yí",t:2},{p:"gòng",t:4},{p:"sì",t:4,s:"stress"},{p:"shí",t:2},{p:"wǔ",t:5},{p:"kuài",t:4,s:"stress"}]},
   {id:"cafe-7",zh:"可以用手机支付吗",en:"Can I pay by phone?",syl:[{p:"ké",t:2},{p:"yǐ",t:3},{p:"yòng",t:4},{p:"shǒu",t:5,s:"stress"},{p:"jī",t:1},{p:"zhī",t:1,s:"stress"},{p:"fù",t:4},{p:"ma",t:0,s:"weak"}]},
   {id:"cafe-8",zh:"扫这里",en:"Scan here.",syl:[{p:"sǎo",t:3,s:"stress"},{p:"zhè",t:4},{p:"lǐ",t:3}]}
 ]},
 {id:"kids", name:"儿童", full:false, sents:[
   {id:"kids-1",zh:"我喜欢你",en:"I like you.",syl:[{p:"wǒ",t:5,s:"weak"},{p:"xǐ",t:5,s:"stress"},{p:"huan",t:0,s:"weak"},{p:"nǐ",t:3,s:"stress"}]},
   {id:"kids-2",zh:"这是什么",en:"What is this?",syl:[{p:"zhè",t:4},{p:"shì",t:4},{p:"shén",t:2,s:"stress"},{p:"me",t:0,s:"weak"}]}
 ]},
 {id:"e1", name:"初级一", full:false, sents:[
   {id:"e1-1",zh:"我是老师",en:"I am a teacher.",syl:[{p:"wǒ",t:5,s:"weak"},{p:"shì",t:4},{p:"lǎo",t:5,s:"stress"},{p:"shī",t:1}]},
   {id:"e1-2",zh:"今天天气很好",en:"The weather is nice today.",syl:[{p:"jīn",t:1},{p:"tiān",t:1},{p:"tiān",t:1,s:"stress"},{p:"qì",t:4},{p:"hěn",t:5},{p:"hǎo",t:3,s:"stress"}]}
 ]},
 {id:"e2", name:"初级二", full:false, sents:[
   {id:"e2-1",zh:"你周末有空吗",en:"Are you free this weekend?",syl:[{p:"nǐ",t:5,s:"weak"},{p:"zhōu",t:1},{p:"mò",t:4,s:"stress"},{p:"yǒu",t:5},{p:"kòng",t:4,s:"stress"},{p:"ma",t:0,s:"weak"}]},
   {id:"e2-2",zh:"我想去北京旅游",en:"I want to travel to Beijing.",syl:[{p:"wǒ",t:5,s:"weak"},{p:"xiǎng",t:5},{p:"qù",t:4},{p:"běi",t:5,s:"stress"},{p:"jīng",t:1},{p:"lǚ",t:5,s:"stress"},{p:"yóu",t:2}]}
 ]},
 {id:"mid", name:"中级", full:false, sents:[
   {id:"mid-1",zh:"我觉得这部电影很有意思",en:"I think this movie is interesting.",syl:[{p:"wǒ",t:5,s:"weak"},{p:"jué",t:2},{p:"de",t:0,s:"weak"},{p:"zhè",t:4},{p:"bù",t:2},{p:"diàn",t:4,s:"stress"},{p:"yǐng",t:5},{p:"hěn",t:5},{p:"yǒu",t:5,s:"stress"},{p:"yì",t:4},{p:"si",t:0,s:"weak"}]},
   {id:"mid-2",zh:"这个问题不太容易回答",en:"This question isn't easy to answer.",syl:[{p:"zhè",t:4},{p:"ge",t:0,s:"weak"},{p:"wèn",t:4,s:"stress"},{p:"tí",t:2},{p:"bú",t:2},{p:"tài",t:4},{p:"róng",t:2,s:"stress"},{p:"yì",t:4},{p:"huí",t:2,s:"stress"},{p:"dá",t:2}]}
 ]}
];

let dIdx=0,sIdx=0,showEn=false,speedMode='n',voiceKey='f';

const PW="tone2026";
const gate=document.getElementById('gate'),app=document.getElementById('app');
function tryEnter(){
  if(document.getElementById('pw').value.trim()===PW){gate.style.display='none';app.style.display='block';init();}
  else document.getElementById('gerr').textContent="密码不对，再试一次 / wrong password";
}
document.getElementById('enter').addEventListener('click',tryEnter);
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')tryEnter();});

const hasAudio=Object.keys(AUDIO).length>0;
const hasTTS='speechSynthesis' in window;
let voices=[],chosen=null;
function loadVoices(){
  voices=speechSynthesis.getVoices().filter(v=>/zh|cmn|Chinese|中文|普通话/i.test(v.lang+' '+v.name));
  const sel=document.getElementById('voiceSel');
  if(voices.length===0){document.getElementById('ttsOff').style.display='block';document.getElementById('voiceRow').style.display='none';return;}
  const score=v=>{const n=(v.name+v.voiceURI).toLowerCase();let s=0;if(/siri|natural|premium|enhanced/.test(n))s+=5;if(/google/.test(n))s+=3;return s;};
  voices.sort((a,b)=>score(b)-score(a));chosen=voices[0];
  sel.innerHTML=voices.map((v,i)=>`<option value="${i}">${v.name}</option>`).join('');
  sel.addEventListener('change',()=>chosen=voices[sel.value]);
}
if(hasTTS){speechSynthesis.onvoiceschanged=loadVoices;loadVoices();}

function play(){
  const s=decks[dIdx].sents[sIdx];
  const a=AUDIO[s.id];
  if(a&&a[voiceKey]&&a[voiceKey][speedMode]){const au=new Audio(a[voiceKey][speedMode]);au.play().catch(()=>{});return;}
  if(hasTTS&&chosen){speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(s.zh);u.voice=chosen;u.lang=chosen.lang;u.rate=(speedMode==='s')?0.6:0.95;speechSynthesis.speak(u);}
}

function drawContour(syl){
  const svg=document.getElementById('svg');svg.innerHTML='';
  const w=600,h=150,n=syl.length,seg=w/n,pad=seg*0.16;
  const TOP=h*0.16,BOT=h*0.74,MID=h*0.46;
  syl.forEach(s=>{
    const i=syl.indexOf(s);const x0=i*seg+pad,x1=(i+1)*seg-pad;let a,b,neutral=false;
    switch(s.t){case 1:a=TOP;b=TOP;break;case 2:a=BOT;b=TOP;break;case 3:a=MID;b=BOT;break;case 4:a=TOP;b=BOT;break;case 5:a=MID+10;b=BOT;break;default:a=MID;b=MID;neutral=true;}
    if(neutral){const c=document.createElementNS('http://www.w3.org/2000/svg','circle');c.setAttribute('cx',(x0+x1)/2);c.setAttribute('cy',MID);c.setAttribute('r',6);c.setAttribute('fill','none');c.setAttribute('stroke','#8A6D3B');c.setAttribute('stroke-width',2);c.setAttribute('opacity',.6);svg.appendChild(c);}
    else{const p=document.createElementNS('http://www.w3.org/2000/svg','path');p.setAttribute('d',`M${x0} ${a} Q ${(x0+x1)/2} ${(a+b)/2} ${x1} ${b}`);p.setAttribute('fill','none');p.setAttribute('stroke-linecap','round');p.setAttribute('stroke',s.s==='weak'?'#8A6D3B':'#BC5B2E');p.setAttribute('stroke-width',s.s==='stress'?8:(s.s==='weak'?2.5:4.5));p.setAttribute('opacity',s.s==='weak'?.5:1);svg.appendChild(p);}
  });
}

function renderTabs(){
  const t=document.getElementById('tabs');
  t.innerHTML=decks.map((d,i)=>`<button class="tab ${i===dIdx?'on':''}" data-i="${i}"><span class="cn">${d.name}</span></button>`).join('');
  t.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>{dIdx=+b.dataset.i;sIdx=0;renderAll();}));
  document.getElementById('deckNote').textContent=decks[dIdx].full?'':'这一组先放了几句种子句，想补满可以让我继续加。';
}
function renderSentence(){
  const s=decks[dIdx].sents[sIdx];
  document.getElementById('sPy').textContent=s.syl.map(x=>x.p).join(' ');
  document.getElementById('sZh').textContent=s.zh;
  document.getElementById('sEn').textContent=s.en;
  document.getElementById('sylRow').innerHTML=s.syl.map(x=>`<span class="cn">${x.p}</span>`).join('');
  document.getElementById('markRow').innerHTML=s.syl.map(x=>x.s==='stress'?'<span class="stress">●</span>':(x.s==='weak'?'<span class="weak">○</span>':'<span></span>')).join('');
  document.getElementById('count').textContent=`${sIdx+1} / ${decks[dIdx].sents.length}`;
  drawContour(s.syl);
}
function renderList(){
  const l=document.getElementById('list');
  l.innerHTML=decks[dIdx].sents.map((s,i)=>`<div class="item ${i===sIdx?'on':''}" data-i="${i}"><div><div class="zh cn">${s.zh}</div><div class="py">${s.syl.map(x=>x.p).join(' ')}</div></div><div class="mini">${i+1}</div></div>`).join('');
  l.querySelectorAll('.item').forEach(it=>it.addEventListener('click',()=>{sIdx=+it.dataset.i;renderSentence();renderList();}));
}
function applyEn(){document.getElementById('sEn').classList.toggle('hide',!showEn);}
function renderAll(){renderTabs();renderSentence();renderList();applyEn();}
function init(){if(hasAudio){document.getElementById('voiceRow').style.display='none';}renderAll();}

document.getElementById('play').addEventListener('click',play);
document.getElementById('mode').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;document.querySelectorAll('#mode button').forEach(x=>x.classList.remove('on'));b.classList.add('on');speedMode=b.dataset.m;});
document.getElementById('voicePick').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;document.querySelectorAll('#voicePick button').forEach(x=>x.classList.remove('on'));b.classList.add('on');voiceKey=b.dataset.v;});
document.getElementById('prev').addEventListener('click',()=>{sIdx=(sIdx-1+decks[dIdx].sents.length)%decks[dIdx].sents.length;renderSentence();renderList();});
document.getElementById('next').addEventListener('click',()=>{sIdx=(sIdx+1)%decks[dIdx].sents.length;renderSentence();renderList();});
document.getElementById('langBtn').addEventListener('click',()=>{showEn=!showEn;document.getElementById('langBtn').textContent=showEn?'隐藏英文 EN':'显示英文 EN';applyEn();});
</script>
</body>
</html>
