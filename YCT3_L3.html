<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chinese Courseware HTML</title>
  <meta http-equiv="refresh" content="0; url=YCT3_L3_GAME_v6_experience_upgrade.html">
  <style>
    :root{
      --bg:#0d0d1a;
      --gold:#FFD700;
      --diamond:#5DE8E8;
      --text:#f7f7ff;
      --muted:#9aa3b2;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:
        radial-gradient(circle at 20% 20%, rgba(93,232,232,.18), transparent 28%),
        radial-gradient(circle at 80% 70%, rgba(255,215,0,.16), transparent 30%),
        var(--bg);
      color:var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .card{
      width:min(720px,92vw);
      border:4px solid var(--gold);
      background:rgba(5,5,18,.88);
      box-shadow:10px 10px 0 #000;
      padding:32px;
      text-align:center;
    }
    h1{
      margin:0 0 12px;
      font-size:clamp(28px,5vw,48px);
      line-height:1.15;
      color:var(--gold);
    }
    p{
      margin:10px 0;
      color:var(--muted);
      font-size:18px;
      line-height:1.7;
    }
    a{
      display:inline-block;
      margin-top:18px;
      padding:14px 22px;
      border:3px solid var(--diamond);
      color:var(--diamond);
      text-decoration:none;
      font-weight:800;
      box-shadow:5px 5px 0 #000;
    }
    a:hover{
      background:var(--diamond);
      color:#071015;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>YCT3 · Lesson 3</h1>
    <p>正在打开 Minecraft 风格互动课件：</p>
    <p><strong>我在画画儿呢。</strong></p>
    <a href="YCT3_L3_GAME_v6_experience_upgrade.html">手动进入课件</a>
  </main>
</body>
</html>
